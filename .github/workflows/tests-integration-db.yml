name: Run integration tests with DB

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: true

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    name: Python iTests With DB
    steps:

      - name: Free disk space by removing large directories
        shell: bash
        run: |
          sudo rm -rf /usr/local/graalvm/
          sudo rm -rf /usr/local/.ghcup/
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Check out Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v10
        with:
          python-version: ${{ inputs.python-version }}
          poetry-version: "2.3.0"

      - name: Install Development Environment
        run: poetry run -- nox -s devenv:install

      - name: Poetry install
        run: poetry run -- nox -s devenv:run -- poetry install

      - name: Poetry Export install
        run: poetry run -- nox -s devenv:run -- poetry self add poetry-plugin-export

      - name: Run Python integration tests with db
        run: >
          poetry run -- nox -s itests:with-db --
          --backend=onprem
          --setup-show
          -o log_cli=true -o log_cli_level=INFO
