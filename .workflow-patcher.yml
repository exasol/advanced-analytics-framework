workflows:
  - name: build-and-publish
    step_customizations:
      - action: INSERT_AFTER
        job: build-and-publish
        step_id: build-artifacts
        content:
          # SLC is uploaded to the GitHub release in step "GitHub Release", see
          # also AAF Developer Guide.
          - name: Build Script Language Container (SLC)
            id: build-script-language-container
            run: poetry run -- nox -s slc:build
  - name: checks
    # This is needed because this project does not need `matrix-all.yml` or `matrix-exasol.yml`.
    # This job will be re-activated in:
    #   https://github.com/exasol/advanced-analytics-framework/issues/353
    remove_jobs:
      - check-workflows
