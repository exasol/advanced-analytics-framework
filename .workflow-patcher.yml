workflows:
  - name: build-and-publish
    step_customizations:
      - action: INSERT_AFTER
        job: build-and-publish
        step_id: build-artifacts
        content:
          # SLC is uploaded to the GitHub release in step "GitHub Release", see
          # also AAF Developer Guide.
          - name: Build Script Language Container (SLC)
            id: build-script-language-container
            run: poetry run -- nox -s slc:build
